services:
  - type: web
    name: ebir-sms
    runtime: python
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate"
    startCommand: "gunicorn config.wsgi --log-file -"
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: ebir-sms-db
          property: connectionString

databases:
  - name: ebir-sms-db
    databaseName: ebir_sms
    plan: free
